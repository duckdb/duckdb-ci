name: "Detect Runners"
description: "Detect runner provider and standard runner labels"

outputs:
  runner_linux_small:
    description: "Runner label for small Linux jobs"
    value: ${{ steps.config.outputs.runner_linux_small }}
  runner_linux_x64:
    description: "Runner label for Linux x64 jobs"
    value: ${{ steps.config.outputs.runner_linux_x64 }}
  runner_linux_22_x64:
    description: "Runner label for Linux 22.04 x64 jobs"
    value: ${{ steps.config.outputs.runner_linux_22_x64 }}
  runner_linux_arm64:
    description: "Runner label for Linux arm64 jobs"
    value: ${{ steps.config.outputs.runner_linux_arm64 }}
  runner_windows_2022_x64:
    description: "Runner label for Windows 2022 x64 jobs"
    value: ${{ steps.config.outputs.runner_windows_2022_x64 }}
  runner_macos_arm64:
    description: "Runner label for macOS arm64 jobs"
    value: ${{ steps.config.outputs.runner_macos_arm64 }}
  runner_macos_14_arm64:
    description: "Runner label for macOS 14 arm64 jobs"
    value: ${{ steps.config.outputs.runner_macos_14_arm64 }}
  runners:
    description: "JSON object with normalized runner labels"
    value: ${{ steps.config.outputs.runners }}
  runner_provider:
    description: "Runner provider namespace|github"
    value: ${{ steps.config.outputs.runner_provider }}

runs:
  using: "composite"
  steps:
    - name: Detect runner provider and labels
      id: config
      shell: bash
      run: |
        set -euo pipefail

        # Fall back to GitHub-native runners for forks.
        if [[ "${{ github.repository_owner }}" == "duckdb" ]]; then
          runner_provider=namespace
          runner_linux_small=namespace-profile-linux-small
          runner_linux_x64=namespace-profile-linux-x64
          runner_linux_22_x64=namespace-profile-linux-22-x64
          runner_linux_arm64=namespace-profile-linux-arm64
          runner_windows_2022_x64=namespace-profile-windows-x64
          runner_macos_arm64=namespace-profile-macos-arm64
          runner_macos_14_arm64=namespace-profile-macos-14-arm64
        else
          runner_provider=github
          runner_linux_small=ubuntu-latest
          runner_linux_x64=ubuntu-latest
          runner_linux_22_x64=ubuntu-22.04
          runner_linux_arm64=ubuntu-24.04-arm
          runner_windows_2022_x64=windows-2022
          runner_macos_arm64=macos-14
          runner_macos_14_arm64=macos-14
        fi

        {
          echo "runner_provider=$runner_provider"
          echo "runner_linux_small=$runner_linux_small"
          echo "runner_linux_x64=$runner_linux_x64"
          echo "runner_linux_22_x64=$runner_linux_22_x64"
          echo "runner_linux_arm64=$runner_linux_arm64"
          echo "runner_windows_2022_x64=$runner_windows_2022_x64"
          echo "runner_macos_arm64=$runner_macos_arm64"
          echo "runner_macos_14_arm64=$runner_macos_14_arm64"
        } >> "$GITHUB_OUTPUT"

        {
          echo "runners<<EOF"
          cat <<EOF
        {
          "linux_x64": "$runner_linux_x64",
          "linux_22_x64": "$runner_linux_22_x64",
          "linux_arm64": "$runner_linux_arm64",
          "windows_2022_x64": "$runner_windows_2022_x64",
          "windows_x64": "$runner_windows_2022_x64",
          "macos_arm64": "$runner_macos_arm64",
          "macos_14_arm64": "$runner_macos_14_arm64"
        }
        EOF
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
