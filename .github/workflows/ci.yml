name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare
    runs-on: namespace-profile-linux-small

    outputs:
      vcpkg_commit: ${{ steps.config.outputs.vcpkg_commit }}
      docker_changed: ${{ steps.changed-files.outputs.any_changed }}
      image_version: ${{ steps.config.outputs.image_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect docker changes
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            docker/**

      - name: Config
        id: config
        run: |
          image_version="$(date -u +%Y%m%d)-${GITHUB_SHA::8}"
          {
            echo vcpkg_commit=84bab45d415d22042bd0b9081aea57f362da3f35
            echo image_version="${image_version}"
          } >> "$GITHUB_OUTPUT"

  build-manylinux:
    name: Build manylinux images (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    needs:
      - prepare
      - lint
    if: ${{ needs.prepare.outputs.docker_changed == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: namespace-profile-linux-x64
          - arch: aarch64
            runs_on: namespace-profile-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cpp/rust/cuda images
        env:
          IMAGE_VERSION: ${{ needs.prepare.outputs.image_version }}
          REPO_PREFIX: ghcr.io/${{ github.repository_owner }}/duckdb-ci
        run: |
          set -eux -o pipefail
          TOOLCHAINS="cpp" ./docker/manylinux_2_28/build.sh "${{ matrix.arch }}"
          docker push "${REPO_PREFIX}/manylinux_2_28_${{ matrix.arch }}_cpp:${IMAGE_VERSION}"
          TOOLCHAINS="rust cuda" ./docker/manylinux_2_28/build.sh "${{ matrix.arch }}"
          docker push "${REPO_PREFIX}/manylinux_2_28_${{ matrix.arch }}_rust:${IMAGE_VERSION}"
          docker push "${REPO_PREFIX}/manylinux_2_28_${{ matrix.arch }}_cuda:${IMAGE_VERSION}"

  test-manylinux-cpp:
    name: Verify manylinux container (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    needs:
      - prepare
      - lint
      - build-manylinux
    if: ${{ needs.prepare.outputs.docker_changed == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: namespace-profile-linux-x64
          - arch: aarch64
            runs_on: namespace-profile-linux-arm64
    container:
      image: ghcr.io/${{ github.repository_owner }}/duckdb-ci/manylinux_2_28_${{ matrix.arch }}_cpp:${{ needs.prepare.outputs.image_version }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: duckdb-ci

      - name: Checkout DuckDB
        uses: ./duckdb-ci/.github/actions/checkout
        with:
          repository: duckdb/duckdb
          path: duckdb
          runner_provider: namespace
          fetch_depth: "0"

      - name: Build DuckDB
        uses: ./duckdb-ci/build-duckdb
        with:
          working-directory: duckdb
          build: make release
          vcpkg-commit: ${{ needs.prepare.outputs.vcpkg_commit }}
          cache-suffix: manylinux_2_28_${{ matrix.arch }}

      - name: Test DuckDB
        working-directory: duckdb
        run:
          ./build/release/duckdb -c "PRAGMA platform; PRAGMA version;"

  lint:
    name: Lint
    runs-on: namespace-profile-linux-small
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify workflows with actionlint and shellcheck
        run: |
          echo "::add-matcher::.github/actionlint-matcher.json"
          echo "::group::ShellCheck version"
          shellcheck --version
          echo "::endgroup::"
          echo "::group::Install actionlint"
          bash <(curl --retry 5 https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "::endgroup::"
          ./actionlint -color

  test-checkout:
    name: Test checkout (${{ matrix.runner_provider }}, ${{ matrix.runs_on }})

    needs:
      - lint

    strategy:
      matrix:
        include:
          - runner_provider: namespace
            runs_on: namespace-profile-linux-small
          - runner_provider: github
            runs_on: ubuntu-latest
          - runner_provider: namespace
            runs_on: namespace-profile-windows-x64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Test custom checkout action
        uses: ./.github/actions/checkout
        with:
          runner_provider: ${{ matrix.runner_provider }}
          fetch_depth: "0"
          ref: ${{ github.sha }}
          path: test

      - name: Verify checkout result
        shell: bash
        run: |
          set -eux -o pipefail
          test -d test/.git
          test -f test/.github/actions/checkout/action.yml
          test "$(git -C test rev-parse --is-shallow-repository)" = "false"
          test "$(git -C test rev-parse HEAD)" = "${{ github.sha }}"

  test-build-duckdb:
    name: Test build-duckdb (${{ matrix.name }})
    runs-on: namespace-profile-linux-x64
    needs:
      - prepare
      - lint

    strategy:
      matrix:
        include:
          - name: Minimal build
            build: echo done > build.txt
            verify: diff -u <(echo done) build.txt

          - name: Default release
            build: make release
            vcpkg-commit: ${{ needs.prepare.outputs.vcpkg_commit }}
            verify: |
              set -eux -o pipefail
              ls -lh ${GITHUB_WORKSPACE}/vcpkg-cache
              ls -lh build/release

          - name: Upload release
            build: make release
            bundle: make release-artifact
            upload-name: linux-release
            vcpkg-commit: ${{ needs.prepare.outputs.vcpkg_commit }}
            verify: |
              set -eux -o pipefail
              ls -lh ${GITHUB_WORKSPACE}/vcpkg-cache
              ls -lh build/release
              ls -lh build/release-artifact.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: duckdb-ci

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          max-size: 5GB
          evict-old-files: 'job'

      - name: Checkout DuckDB
        uses: ./duckdb-ci/.github/actions/checkout
        with:
          repository: duckdb/duckdb
          path: duckdb
          runner_provider: namespace
          fetch_depth: "0"

      - name: Test build DuckDB
        uses: ./duckdb-ci/build-duckdb
        with:
          working-directory: duckdb
          build: ${{ matrix.build }}
          bundle: ${{ matrix.bundle }}
          upload-name: ${{ matrix.upload-name }}
          vcpkg-commit: ${{ matrix.vcpkg-commit }}

      - name: Verify uploaded artifact
        if: ${{ matrix.upload-name }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.upload-name }}
          path: uploaded-artifact

      - name: Verify
        shell: bash
        working-directory: duckdb
        run: ${{ matrix.verify }}

  test-bot:
    name: Test Bot
    runs-on: ubuntu-latest
    needs:
      - lint
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: bot/go.mod
          cache-dependency-path: bot/go.sum

      - name: Build
        working-directory: bot
        run: make image

      - name: Test
        working-directory: bot
        run: make test

      - name: Test image
        working-directory: bot
        run: |
          set -euo pipefail
          KEY_PATH="${RUNNER_TEMP}/bot-app.pem"
          openssl genrsa -out "${KEY_PATH}" 2048
          chmod 644 "${KEY_PATH}"
          PORT=18080
          CONTAINER_NAME="bot-server-test"

          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${PORT}:${PORT}" \
            -e GITHUB_WEBHOOK_SECRET=test-secret \
            -e GITHUB_APP_ID=1 \
            -e GITHUB_APP_PRIVATE_KEY_PATH=/run/secrets/bot-app.pem \
            -e PORT="${PORT}" \
            -v "${KEY_PATH}:/run/secrets/bot-app.pem:ro" \
            duckdb-ci-bot:ci

          container_exists() {
            docker container inspect "${CONTAINER_NAME}" >/dev/null 2>&1
          }

          # Show container logs in background
          sleep 1
          docker logs -f "${CONTAINER_NAME}" &
          LOG_FOLLOW_PID=$!

          cleanup() {
            kill "${LOG_FOLLOW_PID}" 2>/dev/null || true
            if container_exists; then
              docker stop "${CONTAINER_NAME}" >/dev/null 2>&1 || true
              docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          # Verify container responds to incoming HTTP requests.
          code=""
          for _ in {1..10}; do
            code="$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${PORT}/webhook" || true)"
            echo "got HTTP code: ${code}"
            if [ "${code}" = "405" ]; then
              break
            fi
            sleep 1
          done

          if [ "${code}" != "405" ]; then
            echo "bot container did not become ready"
            exit 1
          fi

  summary:
    name: Summary
    if: ${{ always() }}
    needs:
      - lint
      - test-checkout
      - test-build-duckdb
      - test-bot
      - build-manylinux
      - test-manylinux-cpp
    runs-on: ubuntu-slim
    steps:
      - name: Check CI status
        run: |
          NEEDS_JSON='${{ toJSON(needs) }}'

          failed_or_cancelled=$(
            jq -r '
            to_entries[]
              | select(.value.result == "failure" or .value.result == "cancelled")
              | "\(.key): \(.value.result)"
            ' <<<"$NEEDS_JSON"
          )

          if [[ -n "$failed_or_cancelled" ]]; then
            echo "One or more required jobs failed or were cancelled."
            echo "$failed_or_cancelled"
            exit 1
          fi
