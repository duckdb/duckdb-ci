name: Prune Dev GHCR Images

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prune-dev-images:
    name: Prune dev images
    runs-on: ubuntu-slim
    steps:
      - name: Prune old _dev package versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          api_base="/user"
          gh api "${api_base}/packages?package_type=container&per_page=100" \
            --jq '.[] | .name'

          mapfile -t packages < <(
            gh api --paginate "${api_base}/packages?package_type=container&per_page=100" \
              --jq '.[] | .name | select(test("^duckdb-ci/.+_dev$"))'
          )

          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No matching _dev packages found in duckdb/duckdb-ci; nothing to prune."
            exit 0
          fi

          for pkg_name in "${packages[@]}"; do
            pkg_encoded="$(printf '%s' "${pkg_name}" | jq -sRr @uri)"
            versions_endpoint="${api_base}/packages/container/${pkg_encoded}/versions?per_page=100"
            if ! versions_json="$(gh api "${versions_endpoint}" 2>/dev/null)"; then
              echo "Package ${pkg_name} not found or not accessible; skipping"
              continue
            fi

            keep_id="$(jq -r 'sort_by(.created_at) | reverse | .[0].id // empty' <<<"${versions_json}")"
            if [[ -z "${keep_id}" ]]; then
              echo "No versions for ${pkg_name}; skipping"
              continue
            fi

            echo "Keeping latest version id ${keep_id} for ${pkg_name}"

            mapfile -t delete_ids < <(jq -r --arg keep "${keep_id}" 'sort_by(.created_at) | reverse | .[1:][]?.id | tostring | select(. != $keep)' <<<"${versions_json}")

            if [[ ${#delete_ids[@]} -eq 0 ]]; then
              echo "No old versions to delete for ${pkg_name}"
              continue
            fi

            for id in "${delete_ids[@]}"; do
              echo "Deleting ${pkg_name} version id ${id}"
              gh api -X DELETE "${api_base}/packages/container/${pkg_encoded}/versions/${id}"
            done
          done
