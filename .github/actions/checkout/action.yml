name: "Checkout"
description: "Use optimized checkout for custom runners"
inputs:
  runner_provider:
    description: "Runner provider: namespace or github"
    default: "github"
  fetch_depth:
    description: "Fetch depth for actions/checkout"
    default: "1"
  repository:
    description: "Repository name with owner"
    default: "${{ github.repository }}"
  ref:
    description: "Branch, tag, or commit SHA to checkout"
    default: ""
  path:
    description: "Relative path under $GITHUB_WORKSPACE to place the repository"
    default: "."

runs:
  using: "composite"
  steps:
    - name: Detect
      id: detect
      if: inputs.runner_provider == 'namespace' && runner.os != 'Windows'
      shell: bash
      run: |
        # Detect git mirror
        if [ -n "${NSC_GIT_MIRROR:-}" ] && [ -e "${NSC_GIT_MIRROR}" ]; then
          echo "has_mirror=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_mirror=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Checkout (Namespace)
      id: namespace_checkout
      if: inputs.runner_provider == 'namespace' && runner.os != 'Windows' && steps.detect.outputs.has_mirror == 'true'
      uses: namespacelabs/nscloud-checkout-action@v8
      with:
        fetch-depth: ${{ inputs.fetch_depth }}
        path: ${{ inputs.path }}
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
      env:
        GIT_CONFIG_COUNT: 1
        GIT_CONFIG_KEY_0: checkout.workers
        GIT_CONFIG_VALUE_0: 16
      continue-on-error: true

    # Fallback to GitHub's checkout when namespace checkout is unavailable,
    # skipped (e.g. Windows, missing NSC_GIT_MIRROR), or fails.
    - name: Checkout (GitHub)
      if: inputs.runner_provider == 'github' || steps.namespace_checkout.outcome != 'success'
      uses: actions/checkout@v6
      with:
        fetch-depth: ${{ inputs.fetch_depth }}
        path: ${{ inputs.path }}
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
      env:
        GIT_CONFIG_COUNT: 1
        GIT_CONFIG_KEY_0: checkout.workers
        GIT_CONFIG_VALUE_0: 4
